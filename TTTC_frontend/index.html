<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary SEO ── -->
    <title>Tiny Todds Therapy Care | Autism &amp; Child Therapy Center in Chennai</title>
    <meta name="description" content="Expert Speech Therapy, Occupational Therapy, Behavioral Therapy &amp; Early Intervention for children in Chennai. West Mambalam, Chennai - 600033 | +91-9841356600 | Mon–Sat: 8AM–8PM. Book a Free Consultation Today!" />
    <meta name="keywords" content="Speech Therapy Chennai, Occupational Therapy Chennai, Behavioral Therapy Chennai, Special Education Chennai, Parent Training, Early Intervention Chennai, Autism Therapy Chennai, Child Therapy West Mambalam, Pediatric Therapy Chennai" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Tiny Todds Therapy Care" />
    <meta name="theme-color" content="#ffffff" />

    <!-- ✅ FIX 1: Added missing canonical tag -->
    <link rel="canonical" href="https://tinytoddstherapycare.com/" />

    <!-- ── Geo Tags ── -->
    <meta name="geo.region"    content="IN-TN" />
    <meta name="geo.placename" content="Chennai" />
    <meta name="geo.position"  content="13.038246;80.219815" />
    <meta name="ICBM"          content="13.038246,80.219815" />

    <!-- ── Open Graph (WhatsApp / Facebook / LinkedIn previews) ── -->
    <meta property="og:type"             content="website" />
    <meta property="og:site_name"        content="Tiny Todds Therapy Care" />
    <meta property="og:title"            content="Tiny Todds Therapy Care | Autism &amp; Child Therapy Center in Chennai" />
    <meta property="og:description"      content="Expert Speech Therapy, Occupational Therapy, Behavioral Therapy &amp; Early Intervention for children in Chennai. West Mambalam, Chennai - 600033 | +91-9841356600 | Mon–Sat: 8AM–8PM. Book a Free Consultation Today!" />
    <meta property="og:url"              content="https://tinytoddstherapycare.com" />
    <meta property="og:locale"           content="en_IN" />
    <!-- ✅ FIX 2: /src/assets/logo.png is a Vite dev-only path — BROKEN in production.
         WhatsApp, Facebook, Twitter cannot fetch /src/assets paths after build.
         Must use an absolute public URL. -->
    <meta property="og:image"            content="https://tinytoddstherapycare.com/assets/img/og-cover.jpg" />
    <meta property="og:image:secure_url" content="https://tinytoddstherapycare.com/assets/img/og-cover.jpg" />
    <!-- ✅ FIX 3: og:image:type was "image/png" but the file is .jpg → corrected to image/jpeg -->
    <meta property="og:image:type"       content="image/jpeg" />
    <meta property="og:image:width"      content="1200" />
    <meta property="og:image:height"     content="630" />
    <meta property="og:image:alt"        content="Tiny Todds Therapy Care - Autism &amp; Child Therapy Center in Chennai" />

    <!-- ── Twitter Card ── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@TinyTodds" />
    <meta name="twitter:title"       content="Tiny Todds Therapy Care | Autism &amp; Child Therapy Chennai" />
    <!-- ✅ FIX 4: DUPLICATE twitter:description — you had TWO separate tags.
         Only the first is read by Twitter/X. Merged into one complete tag. -->
    <meta name="twitter:description" content="Expert Speech Therapy, Occupational Therapy, Behavioral Therapy &amp; Early Intervention for children in Chennai. West Mambalam, Chennai - 600033 | +91-9841356600 | Mon–Sat: 8AM–8PM." />
    <!-- ✅ FIX 2: Same image fix applied to Twitter image -->
    <meta name="twitter:image"       content="https://tinytoddstherapycare.com/assets/img/og-cover.jpg" />
    <!-- ✅ FIX 5: twitter:image:alt was too vague — improved to descriptive text -->
    <meta name="twitter:image:alt"   content="Tiny Todds Therapy Care - Autism &amp; Child Therapy Center in Chennai" />

    <!-- ── Google Search Console Verification ── -->
    <meta name="google-site-verification" content="HxM1YAjPP3zWEq7gbIxrOlVjoLqqEGdKnb9s8OBgMOU" />

    <!-- ── Favicon ── -->
    <link rel="icon"             type="image/x-icon" href="/favicon.ico" />
    <!-- ✅ FIX 6: apple-touch-icon was pointing to favicon.ico — must be a PNG file -->
    <link rel="apple-touch-icon" sizes="180x180"     href="/apple-touch-icon.png" />
    <link rel="icon"             type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon"             type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <!-- ✅ FIX 7: Added web manifest for PWA / Android home screen support -->
    <link rel="manifest" href="/site.webmanifest" />

    <!-- ── Performance: Preconnect ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://tttc-backend-xpsp.onrender.com" />
    <link rel="preconnect" href="https://img.youtube.com" />

    <!-- ── Performance: Preload LCP image (hero/banner) ── -->
    <!-- ✅ FIX 8: Added fetchpriority="high" so browser prioritises this above all other images -->
    <link rel="preload" href="/images/banner1.webp" as="image" type="image/webp" fetchpriority="high" />

    <!-- ── DNS Prefetch (fallback for older browsers) ── -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://tttc-backend-xpsp.onrender.com" />
    <link rel="dns-prefetch" href="https://img.youtube.com" />

    <!-- ── JSON-LD Structured Data ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "MedicalBusiness",
      "name": "Tiny Todds Therapy Care",
      "image": "https://tinytoddstherapycare.com/assets/img/og-cover.jpg",
      "url": "https://tinytoddstherapycare.com",
      "telephone": "+91-9841356600",
      "priceRange": "$$",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Door No.1, 2nd St, KV Colony, Kasi Viswanathar Colony, West Mambalam",
        "addressLocality": "Chennai",
        "addressRegion": "Tamil Nadu",
        "postalCode": "600033",
        "addressCountry": "IN"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": 13.038246,
        "longitude": 80.219815
      },
      "areaServed": "Chennai",
      "openingHoursSpecification": [
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"],
          "opens": "08:00",
          "closes": "20:00"
        }
      ],
      "sameAs": [
        "https://www.facebook.com/tinytoddstherapycare",
        "https://www.instagram.com/tinytoddstherapycare"
      ]
    }
    </script>

  </head>

  <body>
    <!-- ✅ FIX 9: Added noscript fallback for browsers with JavaScript disabled -->
    <noscript>
      <p style="text-align:center;padding:2rem;font-family:sans-serif;">
        This site requires JavaScript. Please enable JavaScript in your browser.
      </p>
    </noscript>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
